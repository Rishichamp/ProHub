  const Section = ({ id, title, children }) => (
    <div className={`settings-section ${openSections.has(id) ? 'open' : ''}`}>
      <div className="settings-section-header" onClick={() => toggleSection(id)}>
        <span className="settings-section-title">{title}</span>
        <span className="settings-section-chevron">▼</span>
      </div>
      <div className="settings-section-body">{children}</div>
    </div>
  );

  return (
    <div>
      <h2 className="section-title">Settings</h2>

      <Section id="profile" title="👤 Profile">
        <div className="auth-input-group">
          <label>Name</label>
          <input value={name} onChange={e => setName(e.target.value)} />
        </div>
        <div className="auth-input-group">
          <label>Email</label>
          <input value={profile.email || ''} readOnly style={{opacity:0.6}} />
        </div>
        <button className="btn btn-primary" style={{width:'100%',marginTop:8}} onClick={saveProfile}>Save Profile</button>
      </Section>

      <Section id="password" title="🔐 Change Password">
        <div className="auth-input-group">
          <label>New Password</label>
          <input type="password" value={newPassword} onChange={e => setNewPassword(e.target.value)} placeholder="Min 6 characters" />
        </div>
        <div className="auth-input-group">
          <label>Confirm Password</label>
          <input type="password" value={confirmPassword} onChange={e => setConfirmPassword(e.target.value)} />
        </div>
        <button className="btn btn-primary" style={{width:'100%',marginTop:8}} onClick={changePassword}>Update Password</button>
      </Section>

      <Section id="timetable" title="📅 Timetable">
        <div className="settings-row">
          <div><div className="settings-label">Wake Time</div></div>
          <div className="settings-value">{loadUser(userId, 'timetable', {}).wakeTime || 'Not set'}</div>
        </div>
        <div className="settings-row">
          <div><div className="settings-label">Sleep Time</div></div>
          <div className="settings-value">{loadUser(userId, 'timetable', {}).sleepTime || 'Not set'}</div>
        </div>
        <button className="btn btn-secondary" style={{width:'100%',marginTop:8}} onClick={() => showToast('Go to Timetable tab to edit')}>Edit in Timetable</button>
      </Section>

      <Section id="fitness" title="💪 Fitness">
        <div className="settings-row">
          <div><div className="settings-label">Daily Target</div></div>
          <div className="settings-value">{formatDuration(loadUser(userId, 'fitness', {}).dailyTarget || 1800)}</div>
        </div>
        <div className="settings-row">
          <div><div className="settings-label">Total Exercise</div></div>
          <div className="settings-value">{stats.exercise}</div>
        </div>
      </Section>

      <Section id="ai" title="🤖 AI Key">
        <div className="auth-input-group">
          <label>Gemini API Key</label>

        {aiKey && <div style={{fontSize:12,color:'var(--green)',marginTop:8}}>✓ Key configured</div>}

      <Section id="floating" title="📱 Floating Assistant">

        <div className="settings-row">
          <div><div className="settings-label">Timetable Slots</div></div>
          <div className="settings-value">{stats.timetableSlots}</div>
        </div>
        <div className="settings-row">
          <div><div className="settings-label">AI Messages</div></div>
          <div className="settings-value">{stats.aiMessages}</div>
        </div>
        <div className="settings-row">
          <div><div className="settings-label">Storage Used</div></div>
          <div className="settings-value">{(JSON.stringify(localStorage).length / 1024).toFixed(1)} KB</div>

      </Section>

      <Section id="data" title="💾 Data Management">
        <button className="btn btn-secondary" style={{width:'100%',marginBottom:8}} onClick={exportData}>📤 Export Data (JSON)</button>
        <button className="btn btn-danger" style={{width:'100%'}} onClick={() => setShowClearConfirm(true)}>
          {clearStep === 0 ? '🗑 Clear All Data' : '⚠️ Tap again to confirm'}
        </button>
      </Section>

      <Section id="info" title="ℹ️ App Info">
        <div style={{fontSize:13,color:'var(--text2)',lineHeight:1.6}}>
          <p><strong>ProHub</strong> v1.0.0</p>
          <p style={{marginTop:8}}>Built with React 18, WebAuthn, Web Speech API, and Gemini AI.</p>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginTop:12}}>
            <span style={{padding:'4px 10px',background:'var(--card2)',borderRadius:6,fontSize:11}}>React 18</span>
            <span style={{padding:'4px 10px',background:'var(--card2)',borderRadius:6,fontSize:11}}>PWA</span>
            <span style={{padding:'4px 10px',background:'var(--card2)',borderRadius:6,fontSize:11}}>WebAuthn</span>
            <span style={{padding:'4px 10px',background:'var(--card2)',borderRadius:6,fontSize:11}}>Gemini AI</span>
          </div>
          <p style={{marginTop:12,color:'var(--muted)'}}>Install: Chrome menu → Add to Home Screen</p>
        </div>
        <button className="btn btn-danger" style={{width:'100%',marginTop:16}} onClick={onLogout}>🚪 Logout</button>

    </div>
  );
}

function AuthScreen({ onLogin }) {
  const [tab, setTab] = useState('login');
  const [loginEmail, setLoginEmail] = useState('');
  const [loginPassword, setLoginPassword] = useState('');
  const [signupName, setSignupName] = useState('');
  const [signupEmail, setSignupEmail] = useState('');
  const [signupPassword, setSignupPassword] = useState('');
  const [bioState, setBioState] = useState('idle');
  const [showBioSetup, setShowBioSetup] = useState(false);
  const [pendingUser, setPendingUser] = useState(null);
  const [bioEmail, setBioEmail] = useState('');

  const handleSignup = () => {
    if (!signupName.trim() || !signupEmail.trim() || !signupPassword.trim()) {
      alert('Please fill all fields'); return;
    }
    if (signupPassword.length < 6) { alert('Password must be 6+ characters'); return; }
    const users = loadData('users', []);
    if (users.some(u => u.email === signupEmail.trim())) { alert('Email already registered'); return; }

    const user = { id: genId(), name: signupName.trim(), email: signupEmail.trim(), passwordHash: hashPwd(signupPassword), bioCred: null, bioRegDate: null };
    users.push(user);
    saveData('users', users);
    setPendingUser(user);
    setShowBioSetup(true);
  };

  const handleLogin = () => {
    const users = loadData('users', []);
    const user = users.find(u => u.email === loginEmail.trim() && u.passwordHash === hashPwd(loginPassword));
    if (user) {
      saveData('session', { userId: user.id, timestamp: Date.now() });
      onLogin(user);
    } else {
      alert('Invalid email or password');
    }
  };

  const handleBiometricLogin = async () => {
    const users = loadData('users', []);
    const user = users.find(u => u.email === bioEmail.trim());
    if (!user) { alert('User not found'); return; }
    if (!user.bioCred) { alert('No biometric credential registered'); return; }

    setBioState('scanning');
    try {
      const cred = await navigator.credentials.get({
        publicKey: {
          challenge: crypto.getRandomValues(new Uint8Array(32)),
          allowCredentials: [{ id: Uint8Array.from(atob(user.bioCred), c => c.charCodeAt(0)), type: 'public-key' }],
          userVerification: 'required', timeout: 60000
        }
      });
      if (cred) {
        setBioState('success');
        setTimeout(() => {
          saveData('session', { userId: user.id, timestamp: Date.now() });
          onLogin(user);
        }, 800);
      }
    } catch (e) {
      setBioState('error');
      setTimeout(() => setBioState('idle'), 2000);
    }
  };

  const registerBiometric = async () => {
    if (!pendingUser) return;
    setBioState('scanning');
    try {
      const cred = await navigator.credentials.create({
        publicKey: {
          challenge: crypto.getRandomValues(new Uint8Array(32)),
          rp: { name: 'ProHub', id: location.hostname },
          user: { id: Uint8Array.from(pendingUser.id, c => c.charCodeAt(0)), name: pendingUser.email, displayName: pendingUser.name },
          pubKeyCredParams: [{ alg: -7, type: 'public-key' }],
          authenticatorSelection: { authenticatorAttachment: 'platform', userVerification: 'required' },
          timeout: 60000
        }
      });
      if (cred) {
        const users = loadData('users', []);
        const idx = users.findIndex(u => u.id === pendingUser.id);
        if (idx >= 0) {
          users[idx].bioCred = btoa(String.fromCharCode(...new Uint8Array(cred.rawId)));
          users[idx].bioRegDate = new Date().toISOString();
          saveData('users', users);
        }
        setBioState('success');
        setTimeout(() => {
          saveData('session', { userId: pendingUser.id, timestamp: Date.now() });
          onLogin(pendingUser);
        }, 800);
      }
    } catch (e) {
      setBioState('error');
      setTimeout(() => { setBioState('idle'); setShowBioSetup(false); saveData('session', { userId: pendingUser.id, timestamp: Date.now() }); onLogin(pendingUser); }, 1500);
    }
  };

  const skipBio = () => {
    setShowBioSetup(false);
    saveData('session', { userId: pendingUser.id, timestamp: Date.now() });
    onLogin(pendingUser);
  };

  return (
    <div className="auth-screen">
      {isFileProt() && <div className="file-banner">⚠️ Running from file:// — some features (WebAuthn, Notifications) require a web server</div>}
      <div className="auth-logo">ProHub</div>
      <div className="auth-subtitle">Your Professional Command Center</div>

      {showBioSetup ? (
        <div className="auth-card" style={{textAlign:'center'}}>
          <h3 style={{fontFamily:'Syne',fontWeight:700,marginBottom:8}}>Set Up Biometric Login</h3>
          <p style={{fontSize:13,color:'var(--text2)',marginBottom:16}}>Use your fingerprint or face to sign in faster</p>
          <BioCircle state={bioState} onClick={registerBiometric} />
          <p style={{fontSize:12,color:'var(--muted)',marginTop:8}}>{bioState === 'idle' ? 'Tap to register' : bioState === 'scanning' ? 'Scanning...' : bioState === 'success' ? 'Success!' : 'Failed — try again'}</p>
          <button className="btn btn-ghost" style={{width:'100%',marginTop:16}} onClick={skipBio}>Skip for now</button>
        </div>
      ) : (
        <div className="auth-card">
          <div className="auth-tabs">
            <button className={`auth-tab ${tab === 'login' ? 'active' : ''}`} onClick={() => setTab('login')}>Login</button>
            <button className={`auth-tab ${tab === 'signup' ? 'active' : ''}`} onClick={() => setTab('signup')}>Sign Up</button>
            <button className={`auth-tab ${tab === 'bio' ? 'active' : ''}`} onClick={() => setTab('bio')}>Biometric</button>
          </div>

          {tab === 'login' && (
            <>
              <div className="auth-input-group">
                <label>Email</label>
                <input type="email" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} placeholder="you@company.com" />
              </div>
              <div className="auth-input-group">
                <label>Password</label>
                <input type="password" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} placeholder="••••••" />
              </div>
              <button className="btn btn-primary auth-submit" onClick={handleLogin}>Sign In</button>
            </>
          )}

          {tab === 'signup' && (
            <>
              <div className="auth-input-group">
                <label>Full Name</label>
                <input value={signupName} onChange={e => setSignupName(e.target.value)} placeholder="John Doe" />
              </div>
              <div className="auth-input-group">
                <label>Email</label>
                <input type="email" value={signupEmail} onChange={e => setSignupEmail(e.target.value)} placeholder="you@company.com" />
              </div>
              <div className="auth-input-group">
                <label>Password</label>
                <input type="password" value={signupPassword} onChange={e => setSignupPassword(e.target.value)} placeholder="Min 6 characters" />
              </div>
              <button className="btn btn-primary auth-submit" onClick={handleSignup}>Create Account</button>
            </>
          )}

          {tab === 'bio' && (
            <>
              <div className="auth-input-group">
                <label>Email</label>
                <input type="email" value={bioEmail} onChange={e => setBioEmail(e.target.value)} placeholder="you@company.com" />
              </div>
              <BioCircle state={bioState} onClick={handleBiometricLogin} />
              <p style={{fontSize:12,color:'var(--muted)',textAlign:'center',marginTop:8}}>{bioState === 'idle' ? 'Enter email, then tap to scan' : bioState === 'scanning' ? 'Authenticating...' : bioState === 'success' ? 'Welcome back!' : 'Authentication failed'}</p>
            </>
          )}
        </div>
      )}
    </div>
  );
}

  useEffect(() => {
    const t = setInterval(() => setClock(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  // PWA Install prompt
  useEffect(() => {
    const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); };
    window.addEventListener('beforeinstallprompt', handler);
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);

  // Request notification permission
  useEffect(() => {
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }
  }, []);

  const showToast = useCallback((msg) => {
    setToast(msg);
    clearTimeout(toastTimerRef.current);
    toastTimerRef.current = setTimeout(() => setToast(null), 3000);
  }, []);

  const handleInstall = async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') setDeferredPrompt(null);
    } else {
      showToast('Install via browser menu → Add to Home Screen');
    }
  };

  const navItems = [
    { id: 'home', label: 'Home', icon: '🏠' },
    { id: 'timetable', label: 'Timetable', icon: '📅' },
    { id: 'fitness', label: 'Fitness', icon: '💪' },
    { id: 'music', label: 'Music', icon: '🎵' },
    { id: 'ai', label: 'AI', icon: '🤖' },
    { id: 'tasks', label: 'Tasks', icon: '📋' },
    { id: 'notifications', label: 'Notifications', icon: '🔔' },
    { id: 'settings', label: 'Settings', icon: '⚙️' },
  ];

  const unreadCount = notifSummaries.filter(n => !n.read && !n.archived).length;
  const hasNoTimetable = !timetableData.slots || timetableData.slots.length === 0;

  const renderSection = () => {
    switch (activeSection) {
      case 'home': return <Home profile={profile} timetableData={timetableData} fitnessData={fitnessData} todos={todos} nowPlaying={nowPlaying} isPlaying={isPlaying} onNavigate={setActiveSection} />;
      case 'timetable': return <Timetable userId={userId} timetableData={timetableData} onUpdateTimetable={setTimetableData} showToast={showToast} />;
      case 'fitness': return <Fitness userId={userId} fitnessData={fitnessData} onUpdateFitness={setFitnessData} showToast={showToast} />;
      case 'music': return <Music nowPlaying={nowPlaying} isPlaying={isPlaying} onNowPlayingUpdate={(song, playing) => { setNowPlaying(song); setIsPlaying(playing); }} />;
      case 'ai': return <AIAssistant userId={userId} profile={profile} timetableData={timetableData} fitnessData={fitnessData} aiKey={aiKey} onUpdateAIKey={setAIKey} showToast={showToast} />;
      case 'tasks': return <Tasks userId={userId} todos={todos} onUpdateTodos={setTodos} showToast={showToast} />;
      case 'notifications': return <Notifications notifSummaries={notifSummaries} onUpdateNotifSummaries={setNotifSummaries} />;
      case 'settings': return <Settings userId={userId} profile={profile} onUpdateProfile={setProfile} aiKey={aiKey} onUpdateAIKey={(k) => { setAIKey(k); saveData('aiKey', k); }} onLogout={onLogout} showToast={showToast} />;
      default: return <Home profile={profile} timetableData={timetableData} fitnessData={fitnessData} todos={todos} nowPlaying={nowPlaying} isPlaying={isPlaying} onNavigate={setActiveSection} />;
    }
  };

  return (
    <div className="app-shell">
      <header className="header">
        <div className="header-left">
          <div className="hamburger" onClick={() => setNavOpen(true)}>☰</div>
          <span className="logo-text">ProHub</span>
        </div>
        <div className="header-right">
          <span className="live-clock">{clock.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span>
          <div className="avatar">{profile.name?.[0]?.toUpperCase() || '?'}</div>
        </div>
      </header>

      <div className={`nav-overlay ${navOpen ? 'open' : ''}`} onClick={() => setNavOpen(false)}></div>
      <div className={`nav-panel ${navOpen ? 'open' : ''}`}>
        <div className="nav-user-card">
          <div className="nav-avatar">{profile.name?.[0]?.toUpperCase() || '?'}</div>
          <div className="nav-name">{profile.name || 'User'}</div>
          <div className="nav-email">{profile.email || ''}</div>
        </div>
        <div className="nav-items">
          {navItems.map(item => (
            <div key={item.id} className={`nav-item ${activeSection === item.id ? 'active' : ''}`} onClick={() => { setActiveSection(item.id); setNavOpen(false); }}>
              <span className="nav-icon">{item.icon}</span>
              <span className="nav-label">{item.label}</span>
              {item.id === 'timetable' && hasNoTimetable && <span className="nav-badge">!</span>}
              {item.id === 'notifications' && unreadCount > 0 && <span className="nav-badge">{unreadCount}</span>}
            </div>
          ))}
        </div>
        <div className="nav-footer">
          <button className="install-btn" onClick={handleInstall}>📲 Install App</button>
          <button className="logout-btn" onClick={onLogout}>Logout</button>
        </div>
      </div>

      <main className="content-area" key={activeSection}>
        {renderSection()}
      </main>

      {toast && (
        <div className="toast">
          <span>✓</span> {toast}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════

function App() {
  const [screen, setScreen] = useState('auth');
  const [currentUser, setCurrentUser] = useState(null);

  useEffect(() => {
    // Check for existing session
    const session = loadData('session', null);
    if (session) {
      const users = loadData('users', []);
      const user = users.find(u => u.id === session.userId);
      if (user) {
        setCurrentUser(user);
        setScreen('app');
      }
    }

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      const swCode = `
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('activate', e => e.waitUntil(clients.claim()));
        self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
          const clone = res.clone();
          caches.open('prohub-v1').then(cache => cache.put(e.request, clone));
          return res;
        })));
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {});

      // Inject manifest
      const manifest = {
        name: 'ProHub', short_name: 'ProHub',
        start_url: '.', display: 'standalone',
        theme_color: '#08090D', background_color: '#08090D',
        icons: [{ src: 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%236366F1%22 width=%22100%22 height=%22100%22 rx=%2220%22/><text x=%2250%22 y=%2265%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22>⚡</text></svg>', sizes: 'any', type: 'image/svg+xml' }]
      };
      const manifestBlob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
      const manifestUrl = URL.createObjectURL(manifestBlob);
      const link = document.createElement('link');
      link.rel = 'manifest'; link.href = manifestUrl;
      document.head.appendChild(link);
    }
  }, []);

  const handleLogin = (user) => {
    setCurrentUser(user);
    setScreen('app');
  };

  const handleLogout = () => {
    localStorage.removeItem('ph_session');
    setCurrentUser(null);
    setScreen('auth');
  };

  return (
    <>
      {screen === 'auth' && <AuthScreen onLogin={handleLogin} />}
      {screen === 'app' && currentUser && <AppShell user={currentUser} onLogout={handleLogout} />}
    </>
  );
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
